<!DOCTYPE html>
<html>
<head>
  <title>Studenten Inleverpunt - Testpagina</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      background-color: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-weight: bold;
    }
    .form-group input, .form-group textarea {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      padding: 10px 15px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #218838;
    }
    #status {
      margin-top: 20px;
      padding: 10px;
      border-radius: 4px;
      display: none;
    }
    .success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .loading {
      background-color: #e2e3e5;
      color: #383d41;
      border: 1px solid #d6d8db;
    }
  </style>
</head>
<body>

  <h3>Studenten Inleverpunt - Testpagina</h3>
  
  <div class="form-group">
    <label for="studentName">Studentnaam:</label>
    <input type="text" id="studentName" placeholder="Bijv. Jan Jansen">
  </div>
  
  <div class="form-group">
    <label for="component">Component / Module:</label>
    <input type="text" id="component" placeholder="Bijv. automaat">
  </div>
  
  <div class="form-group">
    <label for="assignmentName">Opdracht Naam:</label>
    <input type="text" id="assignmentName" placeholder="Bijv. intro">
  </div>

  <div class="form-group">
    <label for="submissionCode">Inlevercode:</label>
    <input type="text" id="submissionCode" placeholder="Bijv. tvit2026">
  </div>

  <div class="form-group">
    <label for="myText">Inhoud:</label>
    <textarea id="myText" rows="10" placeholder="Typ hier je uitwerking..."></textarea>
  </div>
  
  <button onclick="saveData()">Opslaan naar Drive</button>

  <div id="status"></div>

  <hr style="margin: 30px 0; border: 0; border-top: 2px solid #ccc;">
  
  <h3>Docentenpaneel - Overzicht Inzendingen</h3>
  <div style="margin-bottom: 15px;">
    <button onclick="fetchSubmissions()" style="background-color: #007acc;">Inzendingen Ophalen</button>
  </div>
  
  <div id="submissions-container" style="margin-top: 15px; display: none;">
    <table style="width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; background-color: #fff; border: 1px solid #ddd;">
      <thead>
        <tr style="background-color: #e2e3e5; text-align: left;">
          <th style="padding: 8px; border: 1px solid #ccc;">Module</th>
          <th style="padding: 8px; border: 1px solid #ccc;">Bestand</th>
          <th style="padding: 8px; border: 1px solid #ccc;">Datum</th>
          <th style="padding: 8px; border: 1px solid #ccc;">Grootte</th>
          <th style="padding: 8px; border: 1px solid #ccc; text-align: center;">Actie</th>
        </tr>
      </thead>
      <tbody id="submissions-list"></tbody>
    </table>
  </div>

  <div id="file-viewer" style="margin-top: 25px; display: none; padding: 15px; background-color: #fff; border: 1px solid #007acc; border-radius: 4px;">
    <h4 id="viewer-title" style="margin-top: 0; color: #007acc;">Inhoud bestand:</h4>
    <pre id="viewer-content" style="white-space: pre-wrap; font-family: monospace; font-size: 13px; max-height: 300px; overflow-y: auto; background-color: #f8f9fa; padding: 10px; border: 1px solid #ddd;"></pre>
  </div>

  <script>
    // Laad opgeslagen studentnaam bij het laden van de pagina
    document.addEventListener('DOMContentLoaded', () => {
      const storedName = localStorage.getItem('student_name');
      if (storedName) {
        document.getElementById('studentName').value = storedName;
      }
      const storedCode = localStorage.getItem('submission_code');
      if (storedCode) {
        document.getElementById('submissionCode').value = storedCode;
      }
    });

    // PLAK HIER je gekopieerde Web App URL
    //const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbw_6milGV7uvWTR0-kCD6xrERDdYrJtzTucrkSF9I75-fuE9ktfJZxhPhz1lL840iHW/exec';
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxWV1UzmfhJ0fbTaXPu-0WL7auw4dAwtYXdC4Sfoyc0gsuZ35sn5IDS_RxaVf9_RApA/exec';
    async function saveData() {
      const text = document.getElementById('myText').value;
      const studentName = document.getElementById('studentName').value;
      const component = document.getElementById('component').value;
      const assignmentName = document.getElementById('assignmentName').value;
      const submissionCode = document.getElementById('submissionCode').value;
      const statusElement = document.getElementById('status');
      
      if (!text.trim()) {
        showStatus("Vul a.u.b. wat inhoud in.", "error");
        return;
      }
      
      // Sla de naam en inlevercode lokaal op voor gebruiksgemak de volgende keer
      if (studentName.trim()) {
        localStorage.setItem('student_name', studentName.trim());
      }
      if (submissionCode.trim()) {
        localStorage.setItem('submission_code', submissionCode.trim());
      }

      showStatus("Bezig met opslaan in Google Drive...", "loading");

      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain' // Voorkomt preflight CORS-check (OPTIONS)
          },
          body: JSON.stringify({
            text: text,
            studentName: studentName,
            component: component,
            assignmentName: assignmentName,
            submissionCode: submissionCode
          })
        });

        const result = await response.json();
        
        if (result.status === "success") {
          showStatus(`Bestand succesvol opgeslagen!<br>
            <strong>Bestand:</strong> ${result.fileName}<br>
            <strong>Map:</strong> ${result.folderName || 'Hoofdmap'}<br>
            <strong>Google Drive ID:</strong> ${result.fileId}`, "success");
        } else {
          showStatus("Fout van server: " + result.message, "error");
        }
      } catch (error) {
        showStatus("Fout bij het verbinden met de server: " + error.message + 
          "<br><br><em>Tip: Zorg ervoor dat de Web App is geïmplementeerd (deployed) als 'Me' en toegankelijk is voor 'Anyone' (Iedereen).</em>", "error");
      }
    }

    function showStatus(message, type) {
      const statusElement = document.getElementById('status');
      statusElement.innerHTML = message;
      statusElement.style.display = 'block';
      statusElement.className = type;
    }

    async function fetchSubmissions() {
      const submissionCode = document.getElementById('submissionCode').value;
      const studentName = document.getElementById('studentName').value;
      
      if (!submissionCode.trim()) {
        showStatus("Vul a.u.b. de inlevercode in om de lijst op te halen.", "error");
        return;
      }

      showStatus("Bezig met ophalen van inzendingen...", "loading");

      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain'
          },
          body: JSON.stringify({
            action: "list",
            submissionCode: submissionCode,
            studentName: studentName
          })
        });

        const result = await response.json();
        
        if (result.status === "success") {
          showStatus("Lijst succesvol opgehaald.", "success");
          displaySubmissions(result.files);
        } else {
          showStatus("Fout van server: " + result.message, "error");
        }
      } catch (error) {
        showStatus("Fout bij ophalen: " + error.message, "error");
      }
    }

    function displaySubmissions(files) {
      const container = document.getElementById('submissions-container');
      const tbody = document.getElementById('submissions-list');
      tbody.innerHTML = '';
      
      if (!files) {
        tbody.innerHTML = `<tr><td colspan="5" style="padding: 8px; text-align: center; color: #721c24; background-color: #f8d7da; font-weight: bold;">
          Fout: Geen bestandenlijst ontvangen van de server.<br>
          <span style="font-weight: normal; font-size: 0.9em;">
            Waarschijnlijk draait de Google Apps Script Web App nog op de <strong>oude versie</strong> van de code (die geen 'list' actie ondersteunt). 
            Zie de tip hieronder om de implementatie te updaten.
          </span>
        </td></tr>`;
        container.style.display = 'block';
        return;
      }
      
      if (files.length === 0) {
        tbody.innerHTML = '<tr><td colspan="5" style="padding: 8px; text-align: center;">Geen bestanden gevonden.</td></tr>';
      } else {
        files.forEach(file => {
          const row = document.createElement('tr');
          
          const date = new Date(file.created);
          const dateStr = date.toLocaleString('nl-NL');
          
          row.innerHTML = `
            <td style="padding: 8px; border: 1px solid #ccc;">${file.component || '<em>hoofdmap</em>'}</td>
            <td style="padding: 8px; border: 1px solid #ccc; font-family: monospace;">${file.name}</td>
            <td style="padding: 8px; border: 1px solid #ccc;">${dateStr}</td>
            <td style="padding: 8px; border: 1px solid #ccc;">${file.size} bytes</td>
            <td style="padding: 8px; border: 1px solid #ccc; text-align: center;">
              <button onclick="readSubmission('${file.id}', '${file.name}')" style="padding: 4px 8px; font-size: 12px; background-color: #007acc;">Inzien</button>
            </td>
          `;
          tbody.appendChild(row);
        });
      }
      
      container.style.display = 'block';
    }

    async function readSubmission(fileId, fileName) {
      const submissionCode = document.getElementById('submissionCode').value;
      const studentName = document.getElementById('studentName').value;
      const viewer = document.getElementById('file-viewer');
      const title = document.getElementById('viewer-title');
      const content = document.getElementById('viewer-content');
      
      content.textContent = "Bezig met inladen...";
      viewer.style.display = 'block';
      title.textContent = `Inhoud bestand: ${fileName}`;

      try {
        const response = await fetch(WEB_APP_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain'
          },
          body: JSON.stringify({
            action: "read",
            fileId: fileId,
            submissionCode: submissionCode,
            studentName: studentName
          })
        });

        const result = await response.json();
        if (result.status === "success") {
          content.textContent = result.text;
        } else {
          content.textContent = "Fout bij inladen: " + result.message;
        }
      } catch (error) {
        content.textContent = "Netwerkfout: " + error.message;
      }
    }
  </script>

</body>
</html>
